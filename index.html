<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TESTゲーム01</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --sub: #cbd5e1;
      --danger: #ef4444;
      --line: #facc15;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg2), var(--bg1));
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }
    .wrap {
      width: min(100vw, 560px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 12px;
    }
    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 12px;
      backdrop-filter: blur(6px);
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 2px;
    }
    .sub {
      color: var(--sub);
      font-size: 13px;
      line-height: 1.4;
    }
    .target-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .target-chip {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.12) inset;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }
    .stat {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 8px;
      text-align: center;
    }
    .stat b {
      display: block;
      font-size: 18px;
      margin-top: 4px;
    }
    #gameCanvas {
      width: 100%;
      aspect-ratio: 3 / 5;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      touch-action: manipulation;
      display: block;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      flex: 1;
      min-width: 130px;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
    }
    button.primary {
      background: #2563eb;
    }
    .hint {
      font-size: 13px;
      color: var(--sub);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">TESTゲーム01</div>
      <div class="sub">指定された色だけをタップして消す落下ブロックゲーム</div>
      <div class="target-row">
        <span>今の指定色:</span>
        <div id="targetChip" class="target-chip"></div>
        <b id="targetName">-</b>
      </div>
      <div class="stats">
        <div class="stat">スコア<b id="score">0</b></div>
        <div class="stat">消去数<b id="clears">0</b></div>
        <div class="stat">速度<b id="speed">1.0</b></div>
      </div>
    </div>

    <canvas id="gameCanvas" width="480" height="800"></canvas>

    <div class="controls">
      <button id="startBtn" class="primary">スタート</button>
      <button id="resetBtn">リセット</button>
    </div>

    <div class="card hint">
      上からつながった四角いブロックが徐々に降りてきます。<br>
      指定された色のブロックをタップすると、そのブロックが消え、上にぶら下がっていたブロックも崩れて連鎖で消えます。<br>
      指定色以外をタップしても反応しません。どれかのブロックが下の黄色いラインを超えたらゲームオーバーです。
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const clearsEl = document.getElementById('clears');
    const speedEl = document.getElementById('speed');
    const targetChip = document.getElementById('targetChip');
    const targetName = document.getElementById('targetName');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    const COLS = 6;
    const ROWS = 12;
    const CELL = canvas.width / COLS;
    const LINE_Y = canvas.height - 120;

    const COLORS = [
      { key: 'red', name: '赤', fill: '#ef4444' },
      { key: 'blue', name: '青', fill: '#3b82f6' },
      { key: 'green', name: '緑', fill: '#22c55e' },
      { key: 'yellow', name: '黄', fill: '#facc15' },
      { key: 'purple', name: '紫', fill: '#a855f7' }
    ];

    let grid = [];
    let fallingOffset = -CELL * 3;
    let dropSpeed = 26;
    let lastTime = 0;
    let running = false;
    let gameOver = false;
    let score = 0;
    let clears = 0;
    let targetColor = COLORS[0];

    function emptyGrid() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function pickColor() {
      return COLORS[Math.floor(Math.random() * COLORS.length)];
    }

    function setNewTarget() {
      targetColor = pickColor();
      targetChip.style.background = targetColor.fill;
      targetName.textContent = targetColor.name;
    }

    function updateHud() {
      scoreEl.textContent = score;
      clearsEl.textContent = clears;
      speedEl.textContent = (dropSpeed / 26).toFixed(1);
    }

    function initGame() {
      grid = emptyGrid();
      fallingOffset = -CELL * 3;
      dropSpeed = 26;
      score = 0;
      clears = 0;
      gameOver = false;
      running = false;
      seedInitialBlocks();
      setNewTarget();
      updateHud();
      draw();
    }

    function seedInitialBlocks() {
      for (let r = 0; r < 5; r++) {
        const chainLen = 2 + Math.floor(Math.random() * 3);
        const c = Math.floor(Math.random() * COLS);
        let startR = r;
        for (let i = 0; i < chainLen && startR + i < ROWS; i++) {
          grid[startR + i][c] = { color: pickColor() };
        }
        if (Math.random() < 0.6 && c + 1 < COLS && startR + chainLen - 1 < ROWS) {
          grid[startR + chainLen - 1][c + 1] = { color: pickColor() };
        }
      }
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!grid[r][c] && Math.random() < 0.1) {
            grid[r][c] = { color: pickColor() };
          }
        }
      }
    }

    function spawnTopRow() {
      const newRow = Array(COLS).fill(null);
      const segments = 1 + Math.floor(Math.random() * 3);
      for (let i = 0; i < segments; i++) {
        const c = Math.floor(Math.random() * COLS);
        newRow[c] = { color: pickColor() };
        if (Math.random() < 0.4 && c + 1 < COLS) newRow[c + 1] = { color: pickColor() };
      }
      grid.unshift(newRow);
      if (grid.length > ROWS) grid.pop();
    }

    function advanceFall(dt) {
      fallingOffset += dropSpeed * dt;
      if (fallingOffset >= CELL) {
        fallingOffset -= CELL;
        spawnTopRow();
        dropSpeed = Math.min(62, dropSpeed + 0.35);
        updateHud();
        checkGameOver();
      }
    }

    function checkGameOver() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!grid[r][c]) continue;
          const y = r * CELL + fallingOffset;
          if (y + CELL > LINE_Y) {
            gameOver = true;
            running = false;
            draw();
            return;
          }
        }
      }
    }

    function cellAtPoint(x, y) {
      const col = Math.floor(x / CELL);
      const row = Math.floor((y - fallingOffset) / CELL);
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
      return { row, col };
    }

    function removeClickedBlock(row, col) {
      const cell = grid[row]?.[col];
      if (!cell) return;
      if (cell.color.key !== targetColor.key) return;

      grid[row][col] = null;
      let removed = 1;

      // クリックしたブロックより上にあり、下への接続を失ったブロックを崩す
      const unsupported = findUnsupportedFloating();
      for (const pos of unsupported) {
        if (grid[pos.r][pos.c]) {
          grid[pos.r][pos.c] = null;
          removed += 1;
        }
      }

      score += removed * 10;
      clears += removed;
      updateHud();
      setNewTarget();
      checkGameOver();
      draw();
    }

    function findUnsupportedFloating() {
      // 下端または下につながるブロック列を「支えあり」とみなす
      const supported = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
      const queue = [];

      for (let c = 0; c < COLS; c++) {
        if (grid[ROWS - 1][c]) {
          supported[ROWS - 1][c] = true;
          queue.push([ROWS - 1, c]);
        }
      }

      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      while (queue.length) {
        const [r, c] = queue.shift();
        for (const [dr, dc] of dirs) {
          const nr = r + dr;
          const nc = c + dc;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
          if (!grid[nr][nc] || supported[nr][nc]) continue;
          supported[nr][nc] = true;
          queue.push([nr, nc]);
        }
      }

      const floating = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (grid[r][c] && !supported[r][c]) floating.push({ r, c });
        }
      }
      return floating;
    }

    function drawBlock(x, y, color) {
      const pad = 4;
      const size = CELL - pad * 2;
      ctx.fillStyle = color.fill;
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 2;
      roundRect(ctx, x + pad, y + pad, size, size, 10);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      roundRect(ctx, x + pad + 5, y + pad + 5, size - 10, 10, 6);
      ctx.fill();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 背景グリッド
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for (let c = 0; c <= COLS; c++) {
        const x = c * CELL;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let r = 0; r <= ROWS + 2; r++) {
        const y = r * CELL + (fallingOffset % CELL);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // 危険ライン
      ctx.strokeStyle = '#facc15';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, LINE_Y);
      ctx.lineTo(canvas.width, LINE_Y);
      ctx.stroke();
      ctx.fillStyle = 'rgba(250,204,21,0.18)';
      ctx.fillRect(0, LINE_Y, canvas.width, canvas.height - LINE_Y);

      // ブロック
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = grid[r][c];
          if (!cell) continue;
          const x = c * CELL;
          const y = r * CELL + fallingOffset;
          drawBlock(x, y, cell.color);
        }
      }

      if (!running && !gameOver) {
        overlay('タップで開始', '指定色だけを消して、ライン超えを防ごう');
      }
      if (gameOver) {
        overlay('ゲームオーバー', `スコア ${score} / 消去数 ${clears}`);
      }
    }

    function overlay(title, sub) {
      ctx.fillStyle = 'rgba(2,6,23,0.68)';
      roundRect(ctx, 44, canvas.height / 2 - 90, canvas.width - 88, 180, 22);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 34px sans-serif';
      ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 12);
      ctx.font = '18px sans-serif';
      ctx.fillStyle = '#cbd5e1';
      ctx.fillText(sub, canvas.width / 2, canvas.height / 2 + 28);
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min(0.033, (ts - lastTime) / 1000);
      lastTime = ts;
      if (running && !gameOver) {
        advanceFall(dt);
        draw();
      }
      requestAnimationFrame(loop);
    }

    function startGame() {
      if (gameOver) initGame();
      running = true;
    }

    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches ? e.touches[0] : e;
      const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
      const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
      return { x, y };
    }

    canvas.addEventListener('click', (e) => {
      if (!running && !gameOver) {
        startGame();
        draw();
        return;
      }
      if (gameOver) return;
      const { x, y } = getCanvasPos(e);
      const cell = cellAtPoint(x, y);
      if (!cell) return;
      removeClickedBlock(cell.row, cell.col);
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!running && !gameOver) {
        startGame();
        draw();
        return;
      }
      if (gameOver) return;
      const { x, y } = getCanvasPos(e);
      const cell = cellAtPoint(x, y);
      if (!cell) return;
      removeClickedBlock(cell.row, cell.col);
    }, { passive: false });

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', () => {
      initGame();
      draw();
    });

    initGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
