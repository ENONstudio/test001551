<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TESTゲーム01</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --sub: #cbd5e1;
      --line: #facc15;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg2), var(--bg1));
      min-height: 100svh;
      display: flex;
      justify-content: center;
    }
    .wrap {
      width: min(100vw, 430px);
      min-height: 100svh;
      padding: max(10px, env(safe-area-inset-top)) 12px max(10px, env(safe-area-inset-bottom)) 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 10px 12px;
      backdrop-filter: blur(6px);
    }
    .top {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 10px;
      align-items: stretch;
    }
    .title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 2px;
    }
    .sub {
      color: var(--sub);
      font-size: 12px;
      line-height: 1.35;
    }
    .target-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .target-chip {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.95);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.12) inset;
      flex: 0 0 auto;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      height: 100%;
    }
    .stat {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      color: var(--sub);
    }
    .stat b {
      display: block;
      color: var(--text);
      font-size: 18px;
      margin-top: 2px;
    }
    .game-area {
      flex: 1;
      min-height: 0;
      display: flex;
    }
    #gameCanvas {
      width: 100%;
      height: 100%;
      min-height: 52svh;
      max-height: 62svh;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      touch-action: manipulation;
      display: block;
    }
    .controls {
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
    }
    button.primary { background: #2563eb; }
    .hint {
      font-size: 12px;
      color: var(--sub);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="card">
        <div class="title">TESTゲーム01</div>
        <div class="sub">指定色だけをタップして消す</div>
        <div class="target-row">
          <span>今の色</span>
          <div id="targetChip" class="target-chip"></div>
          <b id="targetName">-</b>
        </div>
      </div>
      <div class="stats">
        <div class="stat">スコア<b id="score">0</b></div>
        <div class="stat">消去数<b id="clears">0</b></div>
        <div class="stat">速度<b id="speed">1.0</b></div>
        <div class="stat">ルール<b id="targetMode">毎回変更</b></div>
      </div>
    </div>

    <div class="game-area">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
      <button id="startBtn" class="primary">スタート</button>
      <button id="resetBtn">リセット</button>
    </div>

    <div class="card hint">
      指定された色だけ消せます。正しい色を1つ消すたびに、次に消す色がすぐ変わります。<br>
      指定色以外は反応しません。下の黄色ラインを超えたらゲームオーバーです。
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const clearsEl = document.getElementById('clears');
    const speedEl = document.getElementById('speed');
    const targetModeEl = document.getElementById('targetMode');
    const targetChip = document.getElementById('targetChip');
    const targetName = document.getElementById('targetName');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    const BASE_W = 390;
    const BASE_H = 620;
    canvas.width = BASE_W;
    canvas.height = BASE_H;

    const COLS = 6;
    const ROWS = 12;
    const COLORS = [
      { key: 'red', name: '赤', fill: '#ef4444' },
      { key: 'blue', name: '青', fill: '#3b82f6' },
      { key: 'green', name: '緑', fill: '#22c55e' },
      { key: 'yellow', name: '黄', fill: '#facc15' },
      { key: 'purple', name: '紫', fill: '#a855f7' }
    ];

    const CELL = canvas.width / COLS;
    const LINE_Y = canvas.height - 88;

    let grid = [];
    let fallingOffset = -CELL * 3;
    let dropSpeed = 22;
    let lastTime = 0;
    let running = false;
    let gameOver = false;
    let score = 0;
    let clears = 0;
    let targetColor = COLORS[0];

    function emptyGrid() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function pickColor() {
      return COLORS[Math.floor(Math.random() * COLORS.length)];
    }

    function setNewTarget() {
      targetColor = pickColor();
      targetChip.style.background = targetColor.fill;
      targetName.textContent = targetColor.name;
      targetModeEl.textContent = '毎回変更';
    }

    function updateHud() {
      scoreEl.textContent = score;
      clearsEl.textContent = clears;
      speedEl.textContent = (dropSpeed / 22).toFixed(1);
      targetModeEl.textContent = '毎回変更';
    }

    function initGame() {
      grid = emptyGrid();
      fallingOffset = -CELL * 3;
      dropSpeed = 22;
      score = 0;
      clears = 0;
      gameOver = false;
      running = false;
      lastTime = 0;
      seedInitialBlocks();
      setNewTarget();
      updateHud();
      draw();
    }

    function seedInitialBlocks() {
      for (let r = 2; r < ROWS - 3; r++) {
        for (let c = 0; c < COLS; c++) {
          if (Math.random() < 0.34) grid[r][c] = { color: pickColor() };
        }
      }
    }

    function spawnTopRow() {
      const newRow = Array(COLS).fill(null);
      const minBlocks = 2;
      const maxBlocks = 4;
      const count = minBlocks + Math.floor(Math.random() * (maxBlocks - minBlocks + 1));
      let filled = 0;
      while (filled < count) {
        const c = Math.floor(Math.random() * COLS);
        if (!newRow[c]) {
          newRow[c] = { color: pickColor() };
          filled++;
        }
      }
      grid.unshift(newRow);
      if (grid.length > ROWS) grid.pop();
    }

    function advanceFall(dt) {
      fallingOffset += dropSpeed * dt;
      if (fallingOffset >= CELL) {
        fallingOffset -= CELL;
        spawnTopRow();
        dropSpeed = Math.min(52, dropSpeed + 0.3);
        checkGameOver();
      }
      updateHud();
    }

    function checkGameOver() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!grid[r][c]) continue;
          const y = r * CELL + fallingOffset;
          if (y + CELL > LINE_Y) {
            gameOver = true;
            running = false;
            draw();
            return;
          }
        }
      }
    }

    function cellAtPoint(x, y) {
      const col = Math.floor(x / CELL);
      const row = Math.floor((y - fallingOffset) / CELL);
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
      return { row, col };
    }

    function removeClickedBlock(row, col) {
      const cell = grid[row]?.[col];
      if (!cell) return;
      if (cell.color.key !== targetColor.key) return;

      grid[row][col] = null;
      score += 10;
      clears += 1;
      setNewTarget();
      updateHud();
      checkGameOver();
      draw();
    }

    function drawBlock(x, y, color) {
      const pad = 4;
      const size = CELL - pad * 2;
      ctx.fillStyle = color.fill;
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 2;
      roundRect(ctx, x + pad, y + pad, size, size, 10);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      roundRect(ctx, x + pad + 5, y + pad + 5, size - 10, 10, 6);
      ctx.fill();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for (let c = 0; c <= COLS; c++) {
        const x = c * CELL;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let r = 0; r <= ROWS + 2; r++) {
        const y = r * CELL + (fallingOffset % CELL);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      ctx.strokeStyle = '#facc15';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, LINE_Y);
      ctx.lineTo(canvas.width, LINE_Y);
      ctx.stroke();
      ctx.fillStyle = 'rgba(250,204,21,0.18)';
      ctx.fillRect(0, LINE_Y, canvas.width, canvas.height - LINE_Y);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = grid[r][c];
          if (!cell) continue;
          const x = c * CELL;
          const y = r * CELL + fallingOffset;
          drawBlock(x, y, cell.color);
        }
      }

      if (!running && !gameOver) {
        overlay('タップで開始', '正しい色を1つずつ消していこう');
      }
      if (gameOver) {
        overlay('ゲームオーバー', `スコア ${score} / 消去数 ${clears}`);
      }
    }

    function overlay(title, sub) {
      ctx.fillStyle = 'rgba(2,6,23,0.72)';
      roundRect(ctx, 36, canvas.height / 2 - 78, canvas.width - 72, 156, 22);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 28px sans-serif';
      ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 8);
      ctx.font = '16px sans-serif';
      ctx.fillStyle = '#cbd5e1';
      ctx.fillText(sub, canvas.width / 2, canvas.height / 2 + 24);
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min(0.033, (ts - lastTime) / 1000);
      lastTime = ts;
      if (running && !gameOver) {
        advanceFall(dt);
        draw();
      }
      requestAnimationFrame(loop);
    }

    function startGame() {
      if (gameOver) initGame();
      running = true;
    }

    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches ? e.touches[0] : e;
      const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
      const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
      return { x, y };
    }

    function handleTap(e) {
      if (!running && !gameOver) {
        startGame();
        draw();
        return;
      }
      if (gameOver) return;
      const { x, y } = getCanvasPos(e);
      const cell = cellAtPoint(x, y);
      if (!cell) return;
      removeClickedBlock(cell.row, cell.col);
    }

    canvas.addEventListener('click', handleTap);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleTap(e);
    }, { passive: false });

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', () => {
      initGame();
      draw();
    });

    initGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
